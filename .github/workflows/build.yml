name: Build

permissions:
  contents: read

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenResty
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2 ca-certificates lsb-release
          wget -qO - https://openresty.org/package/pubkey.gpg | sudo apt-key add -
          echo "deb http://openresty.org/package/ubuntu $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/openresty.list
          sudo apt-get update
          sudo apt-get install -y openresty

      - name: Install library
        run: |
          sudo mkdir -p /usr/local/openresty/lualib/resty/waf
          sudo cp lib/resty/waf/*.lua /usr/local/openresty/lualib/resty/waf/

      - name: Verify module loads
        run: |
          /usr/local/openresty/bin/resty -e '
            local waf = require("resty.waf")
            print("nginx-waf-lua version: " .. waf._VERSION)
          '
