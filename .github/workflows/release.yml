name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag (e.g. v0.1.0) to release'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set version
        id: version
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package
        run: |
          FN=nginx-waf-lua_${{ steps.version.outputs.version }}
          mkdir -p pkg/lib/resty/waf
          cp LICENSE.md README.md CHANGELOG.md pkg/
          cp conf/example.conf pkg/
          cp lib/resty/waf/*.lua pkg/lib/resty/waf/
          tar czf ${FN}.tar.gz -C pkg .
          sha256sum ${FN}.tar.gz > ${FN}.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: nginx-waf-lua ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
