# Example OpenResty configuration with nginx-waf-lua
#
# Requires: OpenResty with lua-resty modules

# Shared dictionary for caching parsed IP lists
lua_shared_dict waf_cache 10m;

# Initialize nginx-waf-lua on startup
init_by_lua_block {
    local waf = require("resty.waf")
    waf.init({
        lists_dir = "/etc/nginx/waf-lists",
        shared_dict = "waf_cache",
        reload_interval = 60,  -- Re-read files every 60 seconds
    })
}

server {
    listen 80;
    server_name example.com;

    # Check every request against loaded IP lists
    access_by_lua_block {
        local waf = require("resty.waf")
        waf.check_request()
    }

    location / {
        proxy_pass http://backend;
    }

    location /public {
        # Skip WAF for public endpoints
        proxy_pass http://backend;
    }
}
